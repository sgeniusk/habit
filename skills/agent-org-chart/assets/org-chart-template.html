<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --ink: #263241;
        --muted: #6c7788;
        --line: #b8c0cc;
        --paper: #f2f3f7;
        --card: #ffffff;
        --teal: #14b8d5;
        --blue: #0f8edb;
        --indigo: #5168d9;
        --shadow: 0 18px 35px rgba(24, 37, 56, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at 50% 0%, #ffffff 0 18%, var(--paper) 55%);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
      }

      .canvas {
        width: min(1120px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 52px 28px 64px;
      }

      .title {
        text-align: center;
        margin-bottom: 36px;
      }

      .title p {
        margin: 0 0 8px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .title h1 {
        margin: 0;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1.05;
      }

      .org {
        position: relative;
        display: grid;
        gap: 28px;
        justify-items: center;
      }

      .org::before {
        position: absolute;
        top: 92px;
        bottom: 112px;
        left: 50%;
        width: 2px;
        background: var(--line);
        content: "";
        transform: translateX(-50%);
      }

      .tier {
        position: relative;
        z-index: 1;
        display: grid;
        width: 100%;
        gap: 22px;
        justify-items: center;
      }

      .tier.departments,
      .tier.specialists {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: stretch;
      }

      .card {
        position: relative;
        display: grid;
        min-height: 118px;
        width: min(100%, 330px);
        padding: 20px 22px 20px 92px;
        border: 1px solid rgba(184, 192, 204, 0.8);
        border-right: 8px solid var(--blue);
        border-radius: 999px 28px 28px 999px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .card.teal {
        border-right-color: var(--teal);
      }

      .card.indigo {
        border-right-color: var(--indigo);
      }

      .badge {
        position: absolute;
        top: 50%;
        left: 18px;
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        border: 8px solid var(--blue);
        border-radius: 50%;
        background: #ffffff;
        color: var(--ink);
        font-size: 24px;
        font-weight: 900;
        box-shadow: 0 10px 20px rgba(24, 37, 56, 0.18);
        transform: translateY(-50%);
      }

      .teal .badge {
        border-color: var(--teal);
      }

      .indigo .badge {
        border-color: var(--indigo);
      }

      .card small {
        color: var(--blue);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .card strong {
        display: block;
        margin-top: 5px;
        color: var(--ink);
        font-size: 18px;
        line-height: 1.2;
      }

      .card span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      .gate {
        border-radius: 24px;
        padding-left: 22px;
        text-align: center;
        border-right-color: var(--teal);
      }

      .gate .badge {
        display: none;
      }

      .department {
        border-radius: 26px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(184, 192, 204, 0.75);
      }

      .department h2 {
        margin: 0 0 14px;
        text-align: center;
        color: var(--ink);
        font-size: 18px;
      }

      .department .card {
        width: 100%;
        min-height: 104px;
        margin-top: 12px;
        box-shadow: 0 14px 26px rgba(24, 37, 56, 0.12);
      }

      @media (max-width: 860px) {
        .tier.departments,
        .tier.specialists {
          grid-template-columns: 1fr;
        }

        .org::before {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <header class="title">
        <p>{{EYEBROW}}</p>
        <h1>{{TITLE}}</h1>
      </header>

      <section class="org" aria-label="{{TITLE}}">{{CONTENT}}</section>
    </main>
  </body>
</html>
