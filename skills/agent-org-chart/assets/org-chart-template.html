<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --ink: #30363d;
        --muted: #6b7280;
        --line: #d6d9df;
        --paper: #f7f7f9;
        --panel: #f0f1f4;
        --head: #4e5a62;
        --accent: #9d9b87;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
      }

      .page {
        width: min(1080px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 48px 28px 64px;
      }

      h1 {
        margin: 0 0 34px;
        color: #252b31;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 800;
        letter-spacing: 0;
        text-align: center;
      }

      .chart {
        display: grid;
        gap: 34px;
      }

      .top-grid {
        display: grid;
        grid-template-columns: 1fr minmax(220px, 280px) 1fr;
        gap: 26px;
        align-items: end;
      }

      .top-grid .side {
        display: grid;
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 16px;
      }

      .top-grid .side.left {
        visibility: hidden;
      }

      .node,
      .agent {
        display: grid;
        min-height: 74px;
        border: 1px solid var(--line);
        background: var(--panel);
        text-align: center;
      }

      .node::before,
      .agent::before {
        display: block;
        padding: 9px 12px;
        background: var(--head);
        color: var(--white);
        content: attr(data-title);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.2;
      }

      .node.accent::before,
      .agent.accent::before {
        background: var(--accent);
      }

      .node span,
      .agent span {
        display: grid;
        min-height: 44px;
        place-items: center;
        padding: 9px 10px 11px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
        line-height: 1.35;
      }

      .middle-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 280px));
        justify-content: center;
        gap: 120px;
        padding-top: 10px;
      }

      .departments {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
        padding-top: 22px;
      }

      .department {
        display: grid;
        gap: 8px;
      }

      .agent {
        min-height: 66px;
      }

      .agent::before {
        font-size: 13px;
      }

      .agent span {
        min-height: 40px;
        font-size: 13px;
      }

      @media (max-width: 880px) {
        .page {
          padding-inline: 18px;
        }

        .top-grid {
          grid-template-columns: minmax(90px, 1fr) minmax(170px, 220px) minmax(180px, 1fr);
          gap: 10px;
        }

        .top-grid .side {
          grid-template-columns: repeat(2, minmax(78px, 1fr));
          gap: 8px;
        }

        .middle-grid {
          grid-template-columns: repeat(2, minmax(170px, 220px));
          gap: 34px;
        }

        .departments {
          gap: 8px;
        }

        .node::before,
        .agent::before {
          padding-inline: 7px;
          font-size: 11px;
        }

        .node span,
        .agent span {
          padding-inline: 7px;
          font-size: 11px;
        }
      }

      @media (max-width: 560px) {
        .top-grid,
        .middle-grid,
        .departments {
          grid-template-columns: 1fr;
          gap: 14px;
        }

        .top-grid .side {
          grid-template-columns: 1fr;
        }

        .top-grid .side.left {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>{{TITLE}}</h1>
      <section class="chart" aria-label="{{TITLE}}">{{CONTENT}}</section>
    </main>
  </body>
</html>
